name: utility-book

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile.dev
    container_name: api
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      pg:
        condition: service_healthy
    restart: unless-stopped


networks:
  default:
    name: utility-book-api-network
